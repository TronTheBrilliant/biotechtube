name: CIA Agent ‚Äî Daily Profile Improvement

on:
  schedule:
    # Run at 3:00 AM UTC daily (after market close, before morning)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI
    inputs:
      batch_size:
        description: 'Number of companies to process'
        required: false
        default: '200'

jobs:
  improve-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CIA Agent
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/cia-agent.ts --batch ${{ github.event.inputs.batch_size || '200' }}
